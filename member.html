<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Vier Espada</title>
  <link rel="stylesheet" href="member.css">
</head>

<body>

<h1>Vier Espada</h1>

<div class="container">

  <!-- 左メニュー -->
  <div class="member-list">
  <div class="card" onclick="showDetail('leader')">団長</div>
  <div class="card" onclick="showDetail('sub')">副団長</div>
  <div class="card" onclick="showDetail('squad1')">♠隊エース</div>
  <div class="card" onclick="showDetail('squad2')">♦隊エース</div>
  <div class="card" onclick="showDetail('squad3')">♥隊エース</div>
  <div class="card" onclick="showDetail('squad4')">♣隊エース</div>
  </div>

</div>

<!-- 右詳細パネル -->
<div id="detailPanel" class="detail-panel">

  <img id="icon" class="icon" src="" alt="icon">

  <h2 id="name">名前</h2>
  <p id="role">役職</p>
  <p id="desc">説明</p>

  <button onclick="closePanel()">閉じる</button>
</div>

<script src="script.js"></script>
</body>
</html>
