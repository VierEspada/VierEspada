<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Vier Espada</title>
  <link rel="stylesheet" href="member.css">
</head>

<body>

<h1>Vier Espada</h1>

<div class="container">

  <!-- 左メニュー -->
  <div class="member-list">
<div class="card leader" onclick="showDetail('leader', this)">団長</div>
<div class="card sub" onclick="showDetail('sub', this)">副団長</div>
<div class="card spade" onclick="showDetail('squad1', this)">♠隊エース</div>
<div class="card diamond" onclick="showDetail('squad2', this)">♦隊エース</div>
<div class="card heart" onclick="showDetail('squad3', this)">♥隊エース</div>
<div class="card club" onclick="showDetail('squad4', this)">♣隊エース</div>
  </div>

</div>

<!-- 右詳細パネル -->
<div id="detailPanel" class="detail-panel">

  <img id="icon" class="icon" src="" alt="icon">

  <h2 id="name">名前</h2>
  <p id="role">役職</p>
  <p id="desc">説明</p>

  <button onclick="closePanel()">閉じる</button>
</div>

<script src="script.js"></script>
</body>
</html>
